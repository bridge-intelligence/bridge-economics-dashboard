name: CI
on:
  push: { branches: [main, dev] }
  pull_request: { branches: [main, dev] }

jobs:
  build:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm }
      - run: npm ci || npm install
      - run: npm run build
